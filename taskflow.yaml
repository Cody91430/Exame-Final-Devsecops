apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow
  template:
    metadata:
      labels:
        app: taskflow
    spec:
      containers:
        - name: taskflow
          image: exam-final:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: taskflow-config
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow
spec:
  type: NodePort
  selector:
    app: taskflow
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
